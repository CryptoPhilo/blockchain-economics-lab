name: Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      migration_name:
        description: 'Migration to apply'
        required: false

jobs:
  migrate:
    name: 🗃️ Apply Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Validate migration secrets
        run: |
          missing=0
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::Missing GitHub secret NEXT_PUBLIC_SUPABASE_URL"
            missing=1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing GitHub secret SUPABASE_DB_PASSWORD"
            missing=1
          fi
          exit "$missing"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Extract project ref from Supabase URL
        id: extract-ref
        run: |
          PROJECT_REF=$(printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | sed -E 's|https://([^.]+)\.supabase\.co.*|\1|')
          if [ -z "$PROJECT_REF" ] || [ "$PROJECT_REF" = "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL is not a valid Supabase project URL"
            exit 1
          fi
          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Apply marketing metadata migration via Supabase pooler
        env:
          PROJECT_REF: ${{ steps.extract-ref.outputs.project_ref }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql "host=aws-1-ap-northeast-2.pooler.supabase.com port=5432 dbname=postgres user=postgres.${PROJECT_REF} sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -f supabase/migrations/20260505_add_marketing_content_metadata.sql
          psql "host=aws-1-ap-northeast-2.pooler.supabase.com port=5432 dbname=postgres user=postgres.${PROJECT_REF} sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "NOTIFY pgrst, 'reload schema';"
