name: Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      migration_name:
        description: 'Migration to apply'
        required: false
      repair_status:
        description: 'Optional migration repair status before db push: applied or reverted'
        required: false
        default: ''
      repair_versions:
        description: 'Optional space-separated migration versions to repair before db push'
        required: false
        default: ''
      skip_local_versions:
        description: 'Optional space-separated local migration versions to hide during this production push'
        required: false
        default: ''
      noop_include_versions:
        description: 'Optional space-separated local migration versions to replace with no-op files before --include-all'
        required: false
        default: ''

jobs:
  migrate:
    name: 🗃️ Apply Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Extract project ref from Supabase URL
        id: extract-ref
        run: |
          PROJECT_REF=$(echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | sed -E 's|https://([^.]+)\.supabase\.co.*|\1|')
          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"
      - name: Link Supabase Project
        run: supabase link --project-ref ${{ steps.extract-ref.outputs.project_ref }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Hide Legacy Local Migrations
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_local_versions != '' }}
        run: |
          mkdir -p /tmp/supabase-skipped-migrations
          for VERSION in ${{ inputs.skip_local_versions }}; do
            MATCHED=0
            for FILE in supabase/migrations/${VERSION}_*.sql; do
              if [ -e "$FILE" ]; then
                mv "$FILE" /tmp/supabase-skipped-migrations/
                MATCHED=1
              fi
            done
            if [ "$MATCHED" = "0" ]; then
              echo "No local migration files matched version $VERSION"
            fi
          done
          echo "Skipped legacy local migrations:"
          ls -1 /tmp/supabase-skipped-migrations || true
      - name: Replace Legacy Local Migrations With No-Ops
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.noop_include_versions != '' }}
        run: |
          mkdir -p /tmp/supabase-noop-replaced-migrations
          for VERSION in ${{ inputs.noop_include_versions }}; do
            for FILE in supabase/migrations/${VERSION}_*.sql; do
              if [ -e "$FILE" ]; then
                mv "$FILE" /tmp/supabase-noop-replaced-migrations/
              fi
            done
            cat > "supabase/migrations/${VERSION}_bce2006_metadata_noop.sql" <<EOF
          -- BCE-2006 metadata-only migration history alignment.
          -- The original local SQL for version ${VERSION} is intentionally not
          -- executed in production because it predates the current remote history
          -- and contains non-idempotent schema changes.
          EOF
          done
          echo "Replaced legacy local migrations with no-op metadata markers:"
          ls -1 /tmp/supabase-noop-replaced-migrations || true
      - name: Repair Migration History
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repair_versions != '' }}
        run: |
          REPAIR_STATUS="${{ inputs.repair_status }}"
          if [ -z "$REPAIR_STATUS" ]; then
            REPAIR_STATUS="applied"
          fi
          case "$REPAIR_STATUS" in
            applied|reverted) ;;
            *) echo "repair_status must be applied or reverted"; exit 1 ;;
          esac
          supabase migration repair --status "$REPAIR_STATUS" ${{ inputs.repair_versions }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Apply Migrations
        run: |
          if [ -n "${{ inputs.noop_include_versions }}" ]; then
            supabase db push --include-all
          else
            supabase db push
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
