name: Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      migration_name:
        description: 'Migration to apply'
        required: false

jobs:
  migrate:
    name: 🗃️ Apply Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Extract project ref from Supabase URL
        id: extract-ref
        run: |
          PROJECT_REF=$(echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | sed -E 's|https://([^.]+)\.supabase\.co.*|\1|')
          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"
      - name: Link Supabase Project
        run: supabase link --project-ref ${{ steps.extract-ref.outputs.project_ref }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Apply Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
