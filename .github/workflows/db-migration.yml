name: Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      migration_name:
        description: 'Optional migration SQL filename to apply directly, e.g. 20260512_add_cmc_rank_to_market_data_daily.sql'
        required: false
      repair_status:
        description: 'Optional migration repair status before db push: applied or reverted'
        required: false
        default: ''
      repair_versions:
        description: 'Optional space-separated migration versions to repair before db push'
        required: false
        default: ''

jobs:
  migrate:
    name: 🗃️ Apply Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.migration_name == '' }}
        with:
          version: latest
      - name: Extract project ref from Supabase URL
        id: extract-ref
        run: |
          PROJECT_REF=$(echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | sed -E 's|https://([^.]+)\.supabase\.co.*|\1|')
          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"
      - name: Link Supabase Project
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.migration_name == '' }}
        run: supabase link --project-ref ${{ steps.extract-ref.outputs.project_ref }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: List Migration History
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.migration_name == '' }}
        run: supabase migration list --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Repair Migration History
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.migration_name == '' && inputs.repair_versions != '' }}
        run: |
          REPAIR_STATUS="${{ inputs.repair_status }}"
          if [ -z "$REPAIR_STATUS" ]; then
            REPAIR_STATUS="applied"
          fi
          case "$REPAIR_STATUS" in
            applied|reverted) ;;
            *) echo "repair_status must be applied or reverted"; exit 1 ;;
          esac
          supabase migration repair --status "$REPAIR_STATUS" ${{ inputs.repair_versions }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Apply Migrations
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.migration_name == '' }}
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Apply selected SQL migration
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.migration_name != '' }}
        run: |
          set -euo pipefail

          MIGRATION_NAME="${{ inputs.migration_name }}"
          if [[ "$MIGRATION_NAME" == *"/"* || "$MIGRATION_NAME" != *.sql ]]; then
            echo "::error::migration_name must be a SQL filename in supabase/migrations"
            exit 1
          fi

          MIGRATION_PATH="supabase/migrations/${MIGRATION_NAME}"
          if [[ ! -f "$MIGRATION_PATH" ]]; then
            echo "::error::Migration file not found: ${MIGRATION_PATH}"
            exit 1
          fi

          jq -Rs '{ query: . }' "$MIGRATION_PATH" > /tmp/supabase-query.json
          curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/${{ steps.extract-ref.outputs.project_ref }}/database/query" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data @/tmp/supabase-query.json
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
