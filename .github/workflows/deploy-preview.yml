name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    name: 🚀 Preview Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Use Vercel GitHub preview deployment
        run: |
          echo "Preview deployment is handled by the Vercel GitHub integration."
          echo "Use the Vercel status check attached to this commit as the deployment source of truth."
      - name: Comment Preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-url
          message: |
            ## 🚀 Preview Deployment
            | Environment | URL |
            |---|---|
            | Preview | See the Vercel status check for this commit |

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.head_ref }}
