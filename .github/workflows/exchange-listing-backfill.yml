name: Exchange Listing Backfill

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Backfill mode'
        required: true
        type: choice
        default: dry_run
        options:
          - dry_run
          - apply
      exchanges:
        description: 'Comma-separated CoinGecko exchange ids, for example binance,gdax'
        required: false
        type: string
      seed_cmc_top30:
        description: 'Seed the 2026-06-15 CoinMarketCap Top 30 snapshot before mapped listing refresh'
        required: false
        type: boolean
        default: false
      page_limit:
        description: 'CoinGecko ticker pages per exchange'
        required: false
        type: number
        default: 3
      request_delay_ms:
        description: 'Delay between CoinGecko requests in milliseconds'
        required: false
        type: number
        default: 2500

permissions:
  contents: read

concurrency:
  group: exchange-listing-backfill-${{ github.event.inputs.exchanges || 'unknown' }}
  cancel-in-progress: false

jobs:
  backfill:
    name: Backfill Exchange Listings
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail

          missing=0
          for name in SUPABASE_URL SUPABASE_SERVICE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::required secret ${name} is not configured"
              missing=1
            else
              echo "${name}=present"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Validate dispatch scope
        env:
          MODE: ${{ github.event.inputs.mode || 'dry_run' }}
          EXCHANGES: ${{ github.event.inputs.exchanges }}
          SEED_CMC_TOP30: ${{ github.event.inputs.seed_cmc_top30 || 'false' }}
          PAGE_LIMIT: ${{ github.event.inputs.page_limit || '3' }}
          REQUEST_DELAY_MS: ${{ github.event.inputs.request_delay_ms || '2500' }}
        run: |
          set -euo pipefail

          if [ "$MODE" != "dry_run" ] && [ "$MODE" != "apply" ]; then
            echo "::error::mode must be dry_run or apply"
            exit 1
          fi

          if [ "$SEED_CMC_TOP30" != "true" ] && [ "$SEED_CMC_TOP30" != "false" ]; then
            echo "::error::seed_cmc_top30 must be true or false"
            exit 1
          fi

          if [ "$SEED_CMC_TOP30" != "true" ] && [ -z "$EXCHANGES" ]; then
            echo "::error::exchanges is required"
            exit 1
          fi

          if [ -n "$EXCHANGES" ]; then
            IFS=',' read -ra exchange_ids <<< "$EXCHANGES"
            if [ "$SEED_CMC_TOP30" != "true" ] && [ "${#exchange_ids[@]}" -gt 5 ]; then
              echo "::error::at most 5 exchanges may be backfilled in one run"
              exit 1
            fi

            for raw_exchange in "${exchange_ids[@]}"; do
              exchange="$(echo "$raw_exchange" | xargs)"
              if [ -z "$exchange" ] || ! [[ "$exchange" =~ ^[a-zA-Z0-9][a-zA-Z0-9_-]*$ ]]; then
                echo "::error::invalid exchange id: $raw_exchange"
                exit 1
              fi
            done
          fi

          if ! [[ "$PAGE_LIMIT" =~ ^[0-9]+$ ]] || [ "$PAGE_LIMIT" -le 0 ] || [ "$PAGE_LIMIT" -gt 10 ]; then
            echo "::error::page_limit must be an integer from 1 to 10"
            exit 1
          fi

          if [ "$MODE" = "apply" ] && [ "$PAGE_LIMIT" -lt 3 ]; then
            if [ "$SEED_CMC_TOP30" = "true" ]; then
              echo "::error::seed_cmc_top30 apply requires page_limit >= 3 so core assets like BTC are not missed on exchanges with unstable ticker ordering"
              exit 1
            fi

            if [ -n "$EXCHANGES" ]; then
              IFS=',' read -ra exchange_ids <<< "$EXCHANGES"
              for raw_exchange in "${exchange_ids[@]}"; do
                exchange="$(echo "$raw_exchange" | xargs | tr '[:upper:]' '[:lower:]')"
                if [ "$exchange" = "upbit" ]; then
                  echo "::error::upbit apply requires page_limit >= 3 so BTC/KRW and BTC/USDT cannot be skipped by CoinGecko ticker ordering"
                  exit 1
                fi
              done
            fi
          fi

          if ! [[ "$REQUEST_DELAY_MS" =~ ^[0-9]+$ ]] || [ "$REQUEST_DELAY_MS" -gt 60000 ]; then
            echo "::error::request_delay_ms must be an integer from 0 to 60000"
            exit 1
          fi

      - name: Run exchange listing backfill
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          MODE: ${{ github.event.inputs.mode || 'dry_run' }}
          EXCHANGES: ${{ github.event.inputs.exchanges }}
          SEED_CMC_TOP30: ${{ github.event.inputs.seed_cmc_top30 || 'false' }}
          PAGE_LIMIT: ${{ github.event.inputs.page_limit || '3' }}
          REQUEST_DELAY_MS: ${{ github.event.inputs.request_delay_ms || '2500' }}
        run: |
          set -euo pipefail

          args=(--page-limit "$PAGE_LIMIT" --request-delay-ms "$REQUEST_DELAY_MS")
          if [ "$SEED_CMC_TOP30" = "true" ]; then
            args+=(--cmc-top30)
          else
            args+=(--exchange "$EXCHANGES")
          fi

          if [ "$MODE" = "apply" ]; then
            args+=(--apply)
          else
            args+=(--dry-run)
          fi

          echo "Invoking exchange listing backfill"
          npx ts-node --compiler-options '{"module":"CommonJS"}' scripts/backfill-exchange-listings.ts "${args[@]}" | tee exchange-listing-backfill.log

      - name: Upload backfill log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exchange-listing-backfill-${{ github.run_number }}
          path: exchange-listing-backfill.log
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Exchange Listing Backfill" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Mode**: ${{ github.event.inputs.mode || 'dry_run' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Exchanges**: ${{ github.event.inputs.exchanges }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Seed CMC Top 30**: ${{ github.event.inputs.seed_cmc_top30 || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Page limit**: ${{ github.event.inputs.page_limit || '3' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Request delay ms**: ${{ github.event.inputs.request_delay_ms || '2500' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run ID**: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
