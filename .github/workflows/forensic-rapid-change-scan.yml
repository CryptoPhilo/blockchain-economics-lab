name: Forensic Rapid Change Scan

on:
  schedule:
    # Candidate card scanner cadence from OPS-007: every 6 hours.
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      top:
        description: 'Number of top market-cap coins to scan'
        required: false
        type: number
        default: 500
      threshold:
        description: 'Override relative deviation threshold percentage'
        required: false
        type: string
      dry_run:
        description: 'Run scanner without DB registration or email'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: forensic-rapid-change-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan Rapid Change Candidates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/pipeline/requirements.txt

      - name: Validate required secrets
        env:
          CMC_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail

          missing=0
          for name in CMC_API_KEY NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::required secret ${name} is not configured"
              missing=1
            else
              echo "${name}=present"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run forensic scanner
        env:
          CMC_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          set -euo pipefail

          TOP="${{ github.event.inputs.top }}"
          if [ -z "$TOP" ]; then
            TOP="500"
          fi

          mkdir -p _legacy/pipeline/scan_results
          OUTPUT="_legacy/pipeline/scan_results/forensic_scan_${GITHUB_RUN_ID}.json"

          args=(--top "$TOP" --output "$OUTPUT")

          THRESHOLD="${{ github.event.inputs.threshold }}"
          if [ -n "$THRESHOLD" ]; then
            args+=(--threshold "$THRESHOLD")
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi

          echo "Invoking: python3 _legacy/pipeline/scan_forensic.py ${args[*]}"
          python3 _legacy/pipeline/scan_forensic.py "${args[@]}"

      - name: Upload scan result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensic-rapid-change-scan-${{ github.run_number }}
          path: _legacy/pipeline/scan_results/forensic_scan_${{ github.run_id }}.json
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Forensic Rapid Change Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger**: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run ID**: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Top**: ${{ github.event.inputs.top || '500' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run**: ${{ github.event.inputs.dry_run || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
