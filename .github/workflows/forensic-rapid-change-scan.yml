name: Forensic Rapid Change Scan

on:
  workflow_dispatch:
    inputs:
      top:
        description: 'Number of top market-cap coins to scan'
        required: false
        type: number
        default: 500
      threshold:
        description: 'Override relative deviation threshold percentage'
        required: false
        type: string
      enable_card_anchor:
        description: 'Explicitly enable the default-off sudden movers card-anchor bridge'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Run without anchor output/state writes'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: forensic-rapid-change-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan Rapid Change Candidates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/pipeline/requirements.txt

      - name: Validate required secrets
        env:
          CMC_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail

          missing=0
          for name in CMC_API_KEY SUPABASE_URL SUPABASE_SERVICE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::required secret ${name} is not configured"
              missing=1
            else
              echo "${name}=present"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run default-off sudden movers bridge
        env:
          CMC_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FORENSIC_RAPID_CHANGE_SCAN_ARTIFACT_PATH: scripts/pipeline/output/sudden_movers_card_anchor_${{ github.run_id }}.json
          PYTHONPATH: ${{ github.workspace }}/scripts/pipeline
        run: |
          set -euo pipefail

          TOP="${{ github.event.inputs.top }}"
          if [ -z "$TOP" ]; then
            TOP="500"
          fi

          mkdir -p scripts/pipeline/output
          OUTPUT="scripts/pipeline/output/sudden_movers_card_anchor_${GITHUB_RUN_ID}.json"

          args=(--limit "$TOP")

          THRESHOLD="${{ github.event.inputs.threshold }}"
          if [ -n "$THRESHOLD" ]; then
            args+=(--threshold "$THRESHOLD")
          fi

          if [ "${{ github.event.inputs.enable_card_anchor }}" = "true" ]; then
            args+=(--enable)
          fi

          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            args+=(--write)
          fi

          echo "Invoking: python3 scripts/pipeline/sudden_movers_card_anchor.py ${args[*]}"
          python3 scripts/pipeline/sudden_movers_card_anchor.py "${args[@]}" | tee "$OUTPUT"

      - name: Upload scan result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensic-rapid-change-scan-${{ github.run_number }}
          path: scripts/pipeline/output/sudden_movers_card_anchor_${{ github.run_id }}.json
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Forensic Rapid Change Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger**: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run ID**: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Top**: ${{ github.event.inputs.top || '500' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Card anchor enabled**: ${{ github.event.inputs.enable_card_anchor || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run**: ${{ github.event.inputs.dry_run || 'true' }}" >> "$GITHUB_STEP_SUMMARY"
