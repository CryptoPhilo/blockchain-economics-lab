name: Gmail Inbox Monitor

on:
  schedule:
    # Keep poll cadence at fixed 30-minute intervals in UTC.
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: gmail-inbox-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
      PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
      PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
      PAPERCLIP_AGENT_ID: ${{ secrets.PAPERCLIP_AGENT_ID }}
      PAPERCLIP_RUN_ID: github-actions-${{ github.run_id }}-${{ github.run_attempt }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_MONITOR_USER: me
      GMAIL_SINCE_HOURS: "0.5"
      GMAIL_PROCESSED_LABEL: Paperclip/Processed
      PAPERCLIP_GOAL_ID: 176cc80b-f108-4098-ad4c-bac14515d346
      PAPERCLIP_PROJECT_ID: c99a905c-51d4-41a7-9635-b14c5537d9ab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip requests
      - name: Run Gmail monitor preflight
        run: ./run_gmail_inbox_monitor.sh --preflight --since-hours "${GMAIL_SINCE_HOURS}"
      - name: Run Gmail monitor
        run: ./run_gmail_inbox_monitor.sh --since-hours "${GMAIL_SINCE_HOURS}"
