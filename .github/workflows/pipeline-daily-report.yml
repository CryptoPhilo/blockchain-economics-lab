name: Pipeline Daily Report

on:
  schedule:
    # Run daily at 00:00 UTC (09:00 KST)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir python-dotenv

      - name: Generate daily pipeline report
        run: |
          python3 scripts/pipeline/daily_pipeline_report.py --output-only

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-daily-report-${{ github.run_number }}
          path: doc/board-reports/COO-*_pipeline_operations_daily.md
          retention-days: 30

      - name: Commit report to repository
        run: |
          git config --local user.email "noreply@paperclip.ing"
          git config --local user.name "Paperclip"
          git add doc/board-reports/COO-*_pipeline_operations_daily.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Add daily pipeline operations report

Generated by GitHub Actions workflow
Issue: BCE-461

Co-Authored-By: Paperclip <noreply@paperclip.ing>"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
