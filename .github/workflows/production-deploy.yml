name: Production Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  production-deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run verify:runtime-pipelines
      - run: npm run verify:pipeline
      - run: npm test -- --passWithNoTests
      - run: npm run build
      - name: Confirm Vercel Git production deployment
        run: |
          echo "Production deployment is handled by the Vercel GitHub integration after main is updated."
          echo "This workflow is the production readiness gate for runtime, website, test, and build checks."
